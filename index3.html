<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - James Webb</title>
    <link rel="stylesheet" href="style3.css">
</head>
<body>

    <header>
        <nav>
            <div class="logo-senai">
                <img src="imagens/logo-senai.png" alt="logo-senai">
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="index2.html">Quem Somos</a></li>
                <li><a href="#">Telescópio</a></li>
                <li><a href="#">NASA</a></li>
                <li><a href="#">Senai SP</a></li>
                <li><a href="index3.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main class="container container-contato">
        
        <h2 class="titulo-sessao">Contato</h2>
        
        

        <form class="formulario-contato" action="#" method="POST">
            <div class="grupo-campo">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="grupo-campo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="Digite seu e-mail" required>
            </div>

            <div class="grupo-campo">
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="6" placeholder="Escreva sua mensagem aqui..." required></textarea>
            </div>

            <button type="submit" class="btn-enviar">Enviar Mensagem</button>
        </form>

    </main>

    <footer>
        <div class="footer-content">
            <p>SENAI-SP</p>
            <p>www.sp.senai.br</p>
        </div>
    </footer>

</body>
</html>
